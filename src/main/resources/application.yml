spring:
  application:
    name: supplychain-agent
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: ${DRUID_INITIAL_SIZE:5}
      min-idle: ${DRUID_MIN_IDLE:5}
      max-active: ${DRUID_MAX_ACTIVE:30}
      max-wait: ${DRUID_MAX_WAIT:60000}
      time-between-eviction-runs-millis: ${DRUID_EVICTION_INTERVAL_MS:60000}
      min-evictable-idle-time-millis: ${DRUID_MIN_EVICTABLE_IDLE_MS:300000}
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: ${DRUID_PS_CACHE_SIZE:20}
      stat-view-servlet:
        enabled: ${DRUID_STAT_VIEW_ENABLED:false}
        login-username: ${DRUID_STAT_USER:admin}
        login-password: ${DRUID_STAT_PASSWORD:admin}
      filter:
        stat:
          enabled: true
          log-slow-sql: ${DRUID_LOG_SLOW_SQL:true}
          slow-sql-millis: ${DRUID_SLOW_SQL_MILLIS:1000}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  servlet:
    context-path: /

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

logging:
  file:
    path: ${LOG_PATH:./logs}
    name: ${LOG_FILE_NAME:supplychain-agent.log}
  level:
    root: INFO
    com.supplychain: INFO
    com.baomidou: INFO
    org.mybatis: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

system-prompt:
  default-env: ${SYSTEM_PROMPT_DEFAULT_ENV:${SPRING_PROFILES_ACTIVE:dev}}
  fallback-enabled: ${SYSTEM_PROMPT_FALLBACK_ENABLED:true}
  fallback-prompt: ${SYSTEM_PROMPT_FALLBACK_PROMPT:【角色】你是供应链智能助理。\n\n【职责】围绕库存、采购、履约、计划等问题提供可执行建议。\n\n【能力】能够进行结构化分析、风险识别、方案对比与行动清单输出。\n\n【场景】适用于日常运营决策支持与异常处理场景。\n\n请严格按照上述四层约束执行，并优先保证输出准确、可执行、可追溯。}
